name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  wrapper:
    name: wrapper (go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: gofmt
        run: test -z "$(gofmt -l .)" || { echo 'gofmt needed on:'; gofmt -l .; exit 1; }
      - name: vet
        run: go vet ./...
      - name: test
        run: go test ./... -race -count=1

  action:
    name: action (build + smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t burling-action:ci .
      - name: Generate throwaway token
        run: python3 testdata/gen_token.py token.jwt
      - name: Run the action container
        run: |
          docker run --rm \
            -e BURLING_COMMAND=lint \
            -e BURLING_TOKEN=token.jwt \
            -e BURLING_OUTPUT=burling.sarif \
            -v "$PWD:/github/workspace" \
            -w /github/workspace \
            burling-action:ci
      - name: Assert SARIF produced
        run: |
          test -s burling.sarif
          python3 -c "import json; d=json.load(open('burling.sarif')); assert d['version']=='2.1.0', d['version']; drv=d['runs'][0]['tool']['driver']; assert drv['name']=='burling', drv['name']; assert len(d['runs'][0]['results'])>0, 'no results'; print('SARIF OK: burling', drv.get('version'), '-', len(d['runs'][0]['results']), 'results')"
